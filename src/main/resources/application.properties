# ===============================
# 🚀 CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=8080

# ===============================
# 🗄️ CONFIGURACIÓN DE MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/techpark_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=techpark_user
spring.datasource.password=TechPark2024!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# 📊 CONFIGURACIÓN JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 📥 INICIALIZACIÓN DE DATOS (DESACTIVADA - Usamos DataInitializer.java)
# ===============================
# Desactivar carga automática de SQL para evitar conflictos
spring.sql.init.mode=never
# spring.jpa.defer-datasource-initialization=false

# ===============================
# 🔍 LOGGING SQL (DEBUG)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.techpark=DEBUG

# ===============================
# 🧾 JACKSON (JSON)
# ===============================
spring.jackson.time-zone=America/Bogota
spring.jackson.default-property-inclusion=non_null

# ===============================
# ⚡ CACHE
# ===============================
spring.cache.type=simple

# ===============================
# 🔌 WEBSOCKET
# ===============================
spring.websocket.path=/ws

# ===============================
# 🔐 JWT (AÑADIR ESTO)
# ===============================
jwt.secret=techparkSecretKey2024ParaJWTTokenSeguro123456789
jwt.expiration=86400000